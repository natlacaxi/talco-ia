        /* Réinitialisation et optimisation des polices */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Utilisation de polices système modernes et haut de gamme avec fallback propre */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Lissage des polices pour un rendu plus net et haut de gamme */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Style global */
        body {
            background-color: #0b0b10;
            background-image:
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.15), transparent 50%),
                radial-gradient(circle at 20% 50%, rgba(255, 94, 98, 0.08), transparent 40%),
                radial-gradient(circle at 50% 20%, rgba(102, 126, 234, 0.05), transparent 50%);
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        /* Animation de tremblement "Hack" pour la carte */
        @keyframes glitch-shake {
            0% { transform: translate(0, 0) skew(0deg); }
            20% { transform: translate(-8px, 5px) skew(-3deg); }
            40% { transform: translate(8px, -5px) skew(5deg); }
            60% { transform: translate(-5px, -3px) skew(-1deg); }
            80% { transform: translate(6px, 4px) skew(3deg); }
            100% { transform: translate(0, 0) skew(0deg); }
        }

        .card {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 2;
        }

        /* Classe ajoutée en JS pour faire trembler la carte au moment du hack */
        .card.compromised {
            animation: glitch-shake 0.15s infinite;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .checkbox-container {
            text-align: left;
            margin-bottom: 30px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 18px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 0.01em;
            color: #9ca3af;
            transition: color 0.2s ease;
        }

        .checkbox-item:hover {
            color: #e5e7eb;
        }

        .checkbox-item input {
            margin-top: 3px;
            margin-right: 14px;
            min-width: 18px;
            min-height: 18px;
            cursor: pointer;
            accent-color: #a78bfa;
        }

        .btn-access {
            display: inline-block;
            width: 100%;
            padding: 15px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: white;
            background: linear-gradient(135deg, #7c3aed 0%, #c084fc 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn-access:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(192, 132, 252, 0.5);
            filter: brightness(1.1);
        }

        .btn-access:disabled {
            background: #1f1f2e;
            color: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Overlay pour les effets visuels */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
        }

        /* ÉTAPE 1 : Flash Méchant (Rouge saturé + effet lignes de glitch) */
        .fade-overlay.evil-flash {
            background: radial-gradient(circle, #ff003c 20%, #7a001e 100%);
            opacity: 1;
            pointer-events: auto;
            background-size: 100% 4px;
            background-image: linear-gradient(to bottom, rgba(255, 0, 60, 0.9) 50%, rgba(0, 0, 0, 0.4) 50%);
        }

        /* ÉTAPE 2 : Fondu au noir d'exactement 1 seconde (1.0s) */
        .fade-overlay.fade-black {
            background-color: #000000;
            opacity: 1;
            pointer-events: auto;
            transition: background-color 1.0s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body>

    <div id="overlay" class="fade-overlay"></div>

    <div class="card" id="mainCard">
        <h2>Talco Intelligence</h2>

        <div class="checkbox-container">
            <label class="checkbox-item">
                <input type="checkbox" id="cond1" onchange="checkConditions()">
                <span>J'accepte les conditions d'utilisation de Talco-Intelligence. Je m'engage à respecter le fonctionnement ainsi que ces failles. J'accepte d'utiliser Talco-Intelligence avec honnêteté à l'égard des clés API.</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" id="cond2" onchange="checkConditions()">
                <span>Je confirme transmettre à Talco-Intelligence mes fichiers personnels, mes discussions privés, mon historique associé à mon compte principale, ma géolocalisation, mes données de suivi de santé, mon gestionnaire de mot de passe, mes fichiers de sauvegarde ainsi que mes coordonnés bancaire.</span>
            </label>
        </div>

        <button id="submitBtn" class="btn-access" disabled onclick="startTransition()">
            Accéder
        </button>
    </div>

    <script>
        function checkConditions() {
            const cond1 = document.getElementById('cond1').checked;
            const cond2 = document.getElementById('cond2').checked;
            const btn = document.getElementById('submitBtn');

            btn.disabled = !(cond1 && cond2);
        }

        function startTransition() {
            const overlay = document.getElementById('overlay');
            const card = document.getElementById('mainCard');

            // 1. Déclenche le flash méchant rouge strié ET fait trembler violemment l'interface
            overlay.classList.add('evil-flash');
            card.classList.add('compromised');

            // 2. Après un flash très court (150ms), basculement vers le fondu au noir qui dure 1 seconde (1000ms)
            setTimeout(() => {
                overlay.classList.remove('evil-flash');
                overlay.classList.add('fade-black');
            }, 150);

            // 3. Redirection à la fin précise du fondu au noir (150ms + 1000ms = 1150ms)
            setTimeout(() => {
                window.location.href = "https://6s9h2o98sq2v69n2aq6sb2h69f4qa96v1b65f.netlify.app/";
            }, 1150);
        }
    </script>

</body>
</html>
